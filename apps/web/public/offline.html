<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - CHIPS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #060e10;
      color: #e8f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e8f4f0;
    }
    
    p {
      font-size: 16px;
      color: #7a9e9a;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    
    .card {
      background-color: #0d1f22;
      border: 1px solid #1a3a3f;
      border-radius: 16px;
      padding: 32px 24px;
    }
    
    button {
      background-color: #22c55e;
      color: #060e10;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
    }
    
    button:hover {
      background-color: #16a34a;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .poker-icon {
      display: inline-block;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">🃏</div>
      <h1>You're Offline</h1>
      <p>
        Looks like you've lost connection. Check your internet and try again to get back to the tables.
      </p>
      <button onclick="window.location.reload()">
        Try Again
      </button>
    </div>
  </div>
</body>
</html>
