services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: backend
    container_name: texas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://texas:texas_password@postgres:5432/texas_staging?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://web.not-replaced-yet.com,https://admin.not-replaced-yet.com}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-https://web.not-replaced-yet.com,https://admin.not-replaced-yet.com}
    command: >
      sh -c "npm run db:migrate:prod --workspace=backend && npm run start:prod --workspace=backend"
    expose:
      - '4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:4000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    volumes:
      - backend_uploads:/repo/apps/backend/uploads
    networks:
      texas-network:
        ipv4_address: 172.28.0.11

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: web
    container_name: texas-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.not-replaced-yet.com}
    command: npm run start --workspace=web
    expose:
      - '3001'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      texas-network:
        ipv4_address: 172.28.0.10

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        APP_NAME: admin
    container_name: texas-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.not-replaced-yet.com}
    command: npm run start --workspace=admin
    expose:
      - '3003'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3003',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      texas-network:
        ipv4_address: 172.28.0.12

  postgres:
    image: postgres:16-alpine
    container_name: texas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: texas
      POSTGRES_PASSWORD: texas_password
      POSTGRES_DB: texas_staging
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U texas -d texas_staging']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      texas-network:
        ipv4_address: 172.28.0.13

  redis:
    image: redis:7-alpine
    container_name: texas-redis
    restart: unless-stopped
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      texas-network:
        ipv4_address: 172.28.0.14

  nginx:
    image: nginx:alpine
    container_name: texas-nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-not-replaced-yet.com}
    command: >
      /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/staging.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/conf.d/staging.conf:/etc/nginx/templates/staging.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - web
      - admin
    networks:
      - texas-network

volumes:
  backend_uploads:
  postgres_data:
  redis_data:

networks:
  texas-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
