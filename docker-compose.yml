services:
  postgres:
    image: postgres:16-alpine
    container_name: texas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: texas
      POSTGRES_PASSWORD: texas_password
      POSTGRES_DB: texas_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U texas -d texas_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: texas-redis
    restart: unless-stopped
    ports:
      - '6380:6379'   # Use 6380 if port 6379 is already taken by another container
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
