name: Build And Deploy Lightsail

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: github sha)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  STAGING_NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_NEXT_PUBLIC_API_URL }}
  STAGING_NEXT_PUBLIC_SOCKET_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SOCKET_URL }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          TAG_INPUT='${{ github.event.inputs.image_tag }}'
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_SHA}"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Validate staging frontend API URL
        run: |
          if [ -z "${STAGING_NEXT_PUBLIC_API_URL}" ]; then
            echo "::error::Missing required secret STAGING_NEXT_PUBLIC_API_URL"
            exit 1
          fi

          case "$STAGING_NEXT_PUBLIC_API_URL" in
            https://*)
              echo "Using STAGING_NEXT_PUBLIC_API_URL=$STAGING_NEXT_PUBLIC_API_URL"
              ;;
            *)
              echo "::error::STAGING_NEXT_PUBLIC_API_URL must start with https://"
              exit 1
              ;;
          esac

      - name: Validate staging socket URL
        run: |
          if [ -z "${STAGING_NEXT_PUBLIC_SOCKET_URL}" ]; then
            echo "::error::Missing required secret STAGING_NEXT_PUBLIC_SOCKET_URL"
            exit 1
          fi

          case "$STAGING_NEXT_PUBLIC_SOCKET_URL" in
            https://*)
              echo "Using STAGING_NEXT_PUBLIC_SOCKET_URL=$STAGING_NEXT_PUBLIC_SOCKET_URL"
              ;;
            *)
              echo "::error::STAGING_NEXT_PUBLIC_SOCKET_URL must start with https://"
              exit 1
              ;;
          esac

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          build-args: |
            APP_NAME=backend
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-backend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          build-args: |
            APP_NAME=web
            NEXT_PUBLIC_API_URL=${{ env.STAGING_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ env.STAGING_NEXT_PUBLIC_SOCKET_URL }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-web:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          build-args: |
            APP_NAME=admin
            NEXT_PUBLIC_API_URL=${{ env.STAGING_NEXT_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-admin:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/texas-admin:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on Lightsail via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          envs: IMAGE_TAG,IMAGE_NAMESPACE
          script: |
            set -e
            cd ${{ secrets.LIGHTSAIL_APP_DIR }}

            compose_cmd() {
              if docker compose version >/dev/null 2>&1; then
                echo "docker compose"
              elif docker-compose --version >/dev/null 2>&1; then
                echo "docker-compose"
              else
                echo "No compose command found" >&2
                exit 1
              fi
            }

            COMPOSE="$(compose_cmd)"

            echo "Using compose command: $COMPOSE"
            echo "Deploy image tag: $IMAGE_TAG"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export IMAGE_REGISTRY=ghcr.io
            export IMAGE_NAMESPACE="$IMAGE_NAMESPACE"
            export IMAGE_TAG="$IMAGE_TAG"

            echo "Disk usage before cleanup:"
            df -h /
            docker system df || true

            # Safe cleanup: remove unused caches/images/containers, keep volumes intact.
            docker container prune -f || true
            docker image prune -af --filter "until=168h" || true
            docker builder prune -af --filter "until=24h" || true

            echo "Disk usage after cleanup:"
            df -h /
            docker system df || true

            if ! $COMPOSE -f docker-compose.remote.yml --env-file docker/.env.staging pull; then
              echo "Initial pull failed, running extra cleanup and retrying once..."
              docker image prune -af || true
              docker builder prune -af || true
              df -h /
              docker system df || true
              $COMPOSE -f docker-compose.remote.yml --env-file docker/.env.staging pull
            fi
            $COMPOSE -f docker-compose.remote.yml --env-file docker/.env.staging up -d || {
              echo "Deploy failed, printing recent logs for diagnosis..."
              df -h /
              docker system df || true
              $COMPOSE -f docker-compose.remote.yml --env-file docker/.env.staging ps
              $COMPOSE -f docker-compose.remote.yml --env-file docker/.env.staging logs --tail=200 backend web admin nginx || true
              exit 1
            }
            $COMPOSE -f docker-compose.remote.yml ps
