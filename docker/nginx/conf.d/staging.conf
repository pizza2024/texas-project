# Nginx configuration for Texas Hold'em staging environment
# Subdomains: web.zo-op.com, admin.zo-op.com, api.zo-op.com

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name web.zo-op.com admin.zo-op.com api.zo-op.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS upstream for web
upstream web_backend {
    server web:3000;
}

# HTTPS upstream for admin
upstream admin_backend {
    server admin:3001;
}

# HTTPS upstream for api
upstream api_backend {
    server backend:4000;
}

# Web frontend
server {
    listen 443 ssl http2;
    server_name web.zo-op.com;

    ssl_certificate /etc/nginx/certs/zo-op.com.crt;
    ssl_certificate_key /etc/nginx/certs/zo-op.com.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin frontend
server {
    listen 443 ssl http2;
    server_name admin.zo-op.com;

    ssl_certificate /etc/nginx/certs/zo-op.com.crt;
    ssl_certificate_key /etc/nginx/certs/zo-op.com.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
